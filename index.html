<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國中會考英語文法複習</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --accent: #f0883e;
  --accent2: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --text: #e6edf3;
  --muted: #8b949e;
  --radius: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(88,166,255,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(240,136,62,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.app {
  width: 100%;
  max-width: 760px;
  position: relative;
  z-index: 1;
}

/* ── HEADER ── */
.header {
  text-align: center;
  margin-bottom: 36px;
  animation: fadeDown 0.6s ease;
}
.header h1 {
  font-family: 'Sora', sans-serif;
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
.header p {
  color: var(--muted);
  margin-top: 6px;
  font-size: 0.9rem;
  letter-spacing: 0.5px;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  animation: fadeUp 0.5s ease;
}

/* ── TOPIC SELECTION ── */
.section-label {
  font-family: 'Sora', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 14px;
}

.topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  margin-bottom: 28px;
}

.topic-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: 12px 16px;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.85rem;
  text-align: left;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1.4;
}
.topic-btn .count-badge {
  margin-left: auto;
  font-size: 0.72rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 8px;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}
.topic-btn:hover, .topic-btn.active {
  border-color: var(--accent2);
  background: rgba(88,166,255,0.08);
  color: var(--accent2);
}
.topic-btn.random {
  background: linear-gradient(135deg, rgba(240,136,62,0.12), rgba(88,166,255,0.12));
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
  justify-content: center;
  grid-column: 1 / -1;
}
.topic-btn.random:hover, .topic-btn.random.active {
  background: linear-gradient(135deg, rgba(240,136,62,0.25), rgba(88,166,255,0.2));
  border-color: var(--accent);
  color: var(--accent);
}

/* ── COUNT SELECTION ── */
.count-row {
  display: flex;
  gap: 10px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.count-btn {
  flex: 1;
  min-width: 60px;
  padding: 12px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  cursor: pointer;
  font-family: 'Sora', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  text-align: center;
  transition: all 0.2s;
}
.count-btn:hover, .count-btn.active {
  border-color: var(--accent);
  background: rgba(240,136,62,0.1);
  color: var(--accent);
}
.count-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* ── START BUTTON ── */
.btn-start {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent), #e07b30);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: 'Sora', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
  box-shadow: 0 4px 24px rgba(240,136,62,0.3);
}
.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(240,136,62,0.4);
}
.btn-start:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* ── QUIZ SCREEN ── */
.quiz-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 12px;
  flex-wrap: wrap;
}
.progress-bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
  min-width: 120px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 99px;
  transition: width 0.4s ease;
}
.progress-text {
  font-family: 'Sora', sans-serif;
  font-size: 0.8rem;
  color: var(--muted);
  white-space: nowrap;
}

.question-stem {
  font-size: 1.05rem;
  line-height: 1.8;
  margin-bottom: 24px;
  font-weight: 500;
  letter-spacing: 0.2px;
}
.blank {
  display: inline-block;
  min-width: 60px;
  border-bottom: 2px solid var(--accent2);
  color: var(--accent2);
  font-weight: 700;
  padding: 0 4px;
}

.options-grid {
  display: grid;
  gap: 10px;
  margin-bottom: 24px;
}
.option-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: 14px 18px;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.95rem;
  text-align: left;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: all 0.2s;
  line-height: 1.5;
}
.option-btn:hover:not(:disabled) {
  border-color: var(--accent2);
  background: rgba(88,166,255,0.07);
}
.option-letter {
  font-family: 'Sora', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  width: 24px;
  height: 24px;
  border-radius: 6px;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--muted);
  transition: all 0.2s;
}
.option-btn.correct {
  border-color: var(--green);
  background: rgba(63,185,80,0.1);
}
.option-btn.correct .option-letter {
  background: var(--green);
  color: #fff;
}
.option-btn.wrong {
  border-color: var(--red);
  background: rgba(248,81,73,0.1);
}
.option-btn.wrong .option-letter {
  background: var(--red);
  color: #fff;
}
.option-btn:disabled {
  cursor: default;
}

/* ── FEEDBACK ── */
.feedback-box {
  border-radius: 12px;
  padding: 20px 22px;
  margin-bottom: 20px;
  animation: fadeUp 0.35s ease;
  display: none;
}
.feedback-box.show { display: block; }
.feedback-box.correct-fb {
  background: rgba(63,185,80,0.1);
  border: 1.5px solid rgba(63,185,80,0.35);
}
.feedback-box.wrong-fb {
  background: rgba(248,81,73,0.08);
  border: 1.5px solid rgba(248,81,73,0.3);
}
.feedback-title {
  font-family: 'Sora', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  margin-bottom: 10px;
}
.feedback-box.correct-fb .feedback-title { color: var(--green); }
.feedback-box.wrong-fb .feedback-title { color: var(--red); }
.feedback-answer {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 8px;
}
.feedback-explanation {
  font-size: 0.92rem;
  line-height: 1.7;
  color: var(--text);
}

.btn-next {
  width: 100%;
  padding: 14px;
  background: var(--surface2);
  border: 1.5px solid var(--accent2);
  border-radius: 12px;
  color: var(--accent2);
  font-family: 'Sora', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: none;
}
.btn-next.show { display: block; }
.btn-next:hover {
  background: rgba(88,166,255,0.1);
}

/* ── RESULTS ── */
.result-header {
  text-align: center;
  margin-bottom: 32px;
}
.score-circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-family: 'Sora', sans-serif;
}
.score-pct {
  font-size: 2rem;
  font-weight: 800;
  line-height: 1;
}
.score-label {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 2px;
}
.score-high { border-color: var(--green); color: var(--green); }
.score-mid { border-color: var(--accent); color: var(--accent); }
.score-low { border-color: var(--red); color: var(--red); }

.stats-row {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.stat-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 8px 18px;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.stat-chip span { color: var(--muted); }
.stat-chip strong { font-family: 'Sora', sans-serif; }

.result-list-label {
  font-family: 'Sora', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.result-item {
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  margin-bottom: 8px;
  font-size: 0.88rem;
  overflow: hidden;
  transition: border-color 0.2s;
}
.result-item.wrong-item {
  border-color: rgba(248,81,73,0.35);
  background: rgba(248,81,73,0.05);
}
.ri-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  cursor: pointer;
  user-select: none;
  line-height: 1.5;
}
.ri-header:hover { background: rgba(255,255,255,0.03); }
.ri-num {
  font-family: 'Sora', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  color: var(--muted);
  min-width: 22px;
  flex-shrink: 0;
}
.ri-icon {
  font-size: 1rem;
  flex-shrink: 0;
}
.ri-stem {
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.ri-ans {
  font-size: 0.8rem;
  color: var(--muted);
  white-space: nowrap;
  margin-right: 4px;
}
.ri-wrong-ans {
  color: var(--red);
  font-weight: 600;
}
.ri-arrow {
  font-size: 0.7rem;
  color: var(--muted);
  transition: transform 0.25s;
  flex-shrink: 0;
}
.result-item.open .ri-arrow { transform: rotate(180deg); }
.ri-body {
  display: none;
  padding: 0 16px 14px 16px;
  border-top: 1px solid var(--border);
}
.result-item.open .ri-body { display: block; }
.ri-full-stem {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 10px;
  margin-top: 12px;
}
.ri-options {
  display: grid;
  gap: 6px;
  margin-bottom: 10px;
}
.ri-opt {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 0.85rem;
  padding: 6px 10px;
  border-radius: 7px;
  border: 1px solid transparent;
  line-height: 1.5;
}
.ri-opt.opt-correct { border-color: var(--green); background: rgba(63,185,80,0.08); color: var(--green); }
.ri-opt.opt-wrong-chosen { border-color: var(--red); background: rgba(248,81,73,0.08); color: var(--red); }
.ri-opt .opt-letter {
  font-family: 'Sora', sans-serif;
  font-weight: 700;
  font-size: 0.78rem;
  flex-shrink: 0;
}
.ri-explanation {
  font-size: 0.83rem;
  line-height: 1.7;
  color: var(--muted);
  border-left: 3px solid var(--border);
  padding-left: 10px;
}

.action-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 28px;
}
.btn-action {
  padding: 14px;
  border-radius: 12px;
  font-family: 'Sora', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border: 1.5px solid;
  text-align: center;
  line-height: 1.4;
}
.btn-action.primary {
  background: linear-gradient(135deg, var(--accent), #e07b30);
  border-color: transparent;
  color: #fff;
  box-shadow: 0 4px 16px rgba(240,136,62,0.25);
}
.btn-action.primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(240,136,62,0.35);
}
.btn-action.secondary {
  background: var(--surface2);
  border-color: var(--accent2);
  color: var(--accent2);
}
.btn-action.secondary:hover {
  background: rgba(88,166,255,0.1);
}

/* ── ANIMATIONS ── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.screen { display: none; }
.screen.active { display: block; animation: fadeUp 0.4s ease; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>✦ 國中會考英語文法複習</h1>
    <p>歷屆試題值得你一刷再刷</p>
  </div>

  <!-- SETUP SCREEN -->
  <div id="screen-setup" class="screen active">
    <div class="card">
      <div class="section-label">選擇主題</div>
      <div class="topic-grid" id="topic-grid"></div>

      <div class="section-label">練習題數</div>
      <div class="count-row" id="count-row">
        <button class="count-btn" data-count="5">5</button>
        <button class="count-btn" data-count="10">10</button>
        <button class="count-btn" data-count="15">15</button>
        <button class="count-btn" data-count="20">20</button>
      </div>

      <button class="btn-start" id="btn-start" disabled>開始練習</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <div class="card">
      <div class="quiz-meta">
        <div class="progress-text" id="progress-text">第 1 / 10 題</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
      </div>
      <div class="question-stem" id="question-stem"></div>
      <div class="options-grid" id="options-grid"></div>
      <div class="feedback-box" id="feedback-box">
        <div class="feedback-title" id="feedback-title"></div>
        <div class="feedback-answer" id="feedback-answer"></div>
        <div class="feedback-explanation" id="feedback-explanation"></div>
      </div>
      <button class="btn-next" id="btn-next">下一題 →</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="screen-results" class="screen">
    <div class="card">
      <div class="result-header">
        <div class="score-circle" id="score-circle">
          <div class="score-pct" id="score-pct">--%</div>
          <div class="score-label">答對率</div>
        </div>
        <div class="stats-row">
          <div class="stat-chip"><span>⏱ 練習時間</span><strong id="stat-time">--</strong></div>
          <div class="stat-chip"><span>✓ 答對</span><strong id="stat-correct">--</strong></div>
          <div class="stat-chip"><span>✗ 答錯</span><strong id="stat-wrong">--</strong></div>
        </div>
      </div>
      <div class="result-list-label">題目一覽 · 錯題優先</div>
      <div id="result-list"></div>
      <div class="action-btns">
        <button class="btn-action secondary" id="btn-retry">🔁 再重新挑一次</button>
        <button class="btn-action primary" id="btn-next-round">點我進入下一回合 →</button>
      </div>
    </div>
  </div>
</div>

<script>
let DATA = null;

async function loadQuestions() {
  try {
    const res = await fetch('question.json?v=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error(`無法讀取 question.json：${res.status}`);
    DATA = await res.json();
    buildSetup();
  } catch (err) {
    console.error(err);
    const grid = document.getElementById('topic-grid');
    grid.innerHTML = `<div style="grid-column:1/-1; color:var(--red); line-height:1.8; padding:16px; border:1px solid var(--red); border-radius:12px; background:rgba(248,81,73,0.08);">題庫載入失敗。請確認 <strong>question.json</strong> 和 <strong>index.html</strong> 放在 GitHub 同一層資料夾，並且檔名大小寫完全一致。</div>`;
    document.getElementById('btn-start').disabled = true;
  }
}


let selectedTopic = null;
let selectedCount = null;
let sessionQuestions = [];
let currentIdx = 0;
let answers = []; // {question, chosen, correct, isCorrect}
let startTime = null;

// Shuffle helper
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  if (m === 0) return `${sec} 秒`;
  return `${m} 分 ${sec} 秒`;
}

// ── SETUP ──
function buildSetup() {
  const grid = document.getElementById('topic-grid');
  grid.innerHTML = '';

  // Random button
  const randBtn = document.createElement('button');
  randBtn.className = 'topic-btn random';
  randBtn.dataset.id = 'random';
  randBtn.innerHTML = '🎲 隨機出題 (全部主題)';
  randBtn.addEventListener('click', () => selectTopic('random', DATA.topics.flatMap(t => t.questions).length));
  grid.appendChild(randBtn);

  // Topic buttons
  DATA.topics.forEach(topic => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn';
    btn.dataset.id = topic.id;
    btn.innerHTML = `<span>${topic.name}</span><span class="count-badge">${topic.questions.length} 題</span>`;
    btn.addEventListener('click', () => selectTopic(topic.id, topic.questions.length));
    grid.appendChild(btn);
  });

  // Count buttons
  document.querySelectorAll('.count-btn').forEach(btn => {
    btn.addEventListener('click', () => selectCount(parseInt(btn.dataset.count)));
  });

  document.getElementById('btn-start').addEventListener('click', startQuiz);
  document.getElementById('btn-retry').addEventListener('click', retryQuiz);
  document.getElementById('btn-next-round').addEventListener('click', nextRound);
  document.getElementById('btn-next').addEventListener('click', nextQuestion);
}

function selectTopic(id, maxCount) {
  selectedTopic = id;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.topic-btn[data-id="${id}"]`);
  if (btn) btn.classList.add('active');

  // Update count availability
  document.querySelectorAll('.count-btn').forEach(b => {
    const c = parseInt(b.dataset.count);
    b.disabled = false;
    if (c > maxCount) b.disabled = true;
  });

  // Auto-select count if current selection is now invalid
  if (selectedCount && selectedCount > maxCount) {
    // find max available
    const opts = [5, 10, 15, 20].filter(n => n <= maxCount);
    if (opts.length > 0) selectCount(opts[opts.length - 1]);
    else { selectedCount = null; updateStartBtn(); }
  }
  updateStartBtn();
}

function selectCount(n) {
  selectedCount = n;
  document.querySelectorAll('.count-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.count) === n);
  });
  updateStartBtn();
}

function updateStartBtn() {
  document.getElementById('btn-start').disabled = !(selectedTopic && selectedCount);
}

function startQuiz() {
  let pool;
  if (selectedTopic === 'random') {
    pool = DATA.topics.flatMap(t => t.questions);
  } else {
    const topic = DATA.topics.find(t => t.id === selectedTopic);
    pool = topic.questions;
  }
  pool = shuffle(pool);
  sessionQuestions = pool.slice(0, selectedCount);
  currentIdx = 0;
  answers = [];
  showScreen('quiz');
  showQuestion();
}

// ── QUIZ ──
function showQuestion() {
  if (currentIdx === 0) startTime = Date.now();
  const q = sessionQuestions[currentIdx];
  const total = sessionQuestions.length;

  document.getElementById('progress-text').textContent = `第 ${currentIdx + 1} / ${total} 題`;
  document.getElementById('progress-bar').style.width = `${(currentIdx / total) * 100}%`;

  // Stem - replace ___ with styled blank
  const stem = q.stem.replace(/___/g, '<span class="blank">___</span>');
  document.getElementById('question-stem').innerHTML = stem;

  // Options
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  Object.entries(q.options).forEach(([letter, text]) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letter}</span><span>${text}</span>`;
    btn.addEventListener('click', () => submitAnswer(letter));
    grid.appendChild(btn);
  });

  // Hide feedback and next
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  document.getElementById('btn-next').className = 'btn-next';
}

function submitAnswer(chosen) {
  const q = sessionQuestions[currentIdx];
  const isCorrect = chosen === q.answer;

  answers.push({ question: q, chosen, isCorrect });

  // Highlight options
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.disabled = true;
    const letter = Object.keys(q.options)[i];
    if (letter === q.answer) btn.classList.add('correct');
    else if (letter === chosen && !isCorrect) btn.classList.add('wrong');
  });

  // Show feedback
  const fb = document.getElementById('feedback-box');
  const title = document.getElementById('feedback-title');
  const ansEl = document.getElementById('feedback-answer');
  const expEl = document.getElementById('feedback-explanation');

  if (isCorrect) {
    fb.className = 'feedback-box correct-fb show';
    title.textContent = '🎉 Great!';
  } else {
    fb.className = 'feedback-box wrong-fb show';
    title.textContent = '😢 答錯別氣餒！弄懂它更重要！';
  }
  ansEl.textContent = `正確答案：(${q.answer}) ${q.options[q.answer]}`;
  expEl.textContent = q.explanation;

  // Show next button
  const nextBtn = document.getElementById('btn-next');
  nextBtn.className = 'btn-next show';
  if (currentIdx === sessionQuestions.length - 1) {
    nextBtn.textContent = '查看結果 ✦';
  } else {
    nextBtn.textContent = '下一題 →';
  }
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= sessionQuestions.length) {
    showResults();
  } else {
    showQuestion();
  }
}

// ── RESULTS ──
function showResults() {
  const elapsed = Date.now() - startTime;
  const correct = answers.filter(a => a.isCorrect).length;
  const total = answers.length;
  const pct = Math.round((correct / total) * 100);

  // Score circle
  const circle = document.getElementById('score-circle');
  circle.className = 'score-circle ' + (pct >= 80 ? 'score-high' : pct >= 50 ? 'score-mid' : 'score-low');
  document.getElementById('score-pct').textContent = pct + '%';

  document.getElementById('stat-time').textContent = formatTime(elapsed);
  document.getElementById('stat-correct').textContent = correct + ' 題';
  document.getElementById('stat-wrong').textContent = (total - correct) + ' 題';

  // Build result list: wrong first
  const wrongAnswers = answers.filter(a => !a.isCorrect);
  const rightAnswers = answers.filter(a => a.isCorrect);
  const sorted = [...wrongAnswers, ...rightAnswers];

  const list = document.getElementById('result-list');
  list.innerHTML = '';
  sorted.forEach((a, i) => {
    const q = a.question;
    const item = document.createElement('div');
    item.className = 'result-item' + (a.isCorrect ? '' : ' wrong-item');

    // Build options HTML
    const optsHtml = Object.entries(q.options).map(([letter, text]) => {
      let cls = '';
      if (letter === q.answer) cls = 'opt-correct';
      else if (letter === a.chosen && !a.isCorrect) cls = 'opt-wrong-chosen';
      return `<div class="ri-opt ${cls}"><span class="opt-letter">(${letter})</span><span>${text}</span></div>`;
    }).join('');

    const ansLabel = a.isCorrect
      ? `<span style="color:var(--green)">${a.question.answer}</span>`
      : `<span class="ri-wrong-ans">${a.chosen} → ${q.answer}</span>`;

    item.innerHTML = `
      <div class="ri-header">
        <div class="ri-num">${i + 1}</div>
        <div class="ri-icon">${a.isCorrect ? '✓' : '✗'}</div>
        <div class="ri-stem">${q.stem.length > 55 ? q.stem.slice(0, 55) + '…' : q.stem}</div>
        <div class="ri-ans">${ansLabel}</div>
        <div class="ri-arrow">▼</div>
      </div>
      <div class="ri-body">
        <div class="ri-full-stem">${q.stem}</div>
        <div class="ri-options">${optsHtml}</div>
        <div class="ri-explanation">📝 ${q.explanation}</div>
      </div>
    `;

    item.querySelector('.ri-header').addEventListener('click', () => {
      item.classList.toggle('open');
    });

    list.appendChild(item);
  });

  showScreen('results');
}

function retryQuiz() {
  // Reshuffle same questions
  sessionQuestions = shuffle(sessionQuestions);
  currentIdx = 0;
  answers = [];
  showScreen('quiz');
  showQuestion();
}

function nextRound() {
  showScreen('setup');
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
}

// Init
loadQuestions();
</script>
